<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reGISH — OG Share Image (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1e4035;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }

  /* Ambient light blobs */
  .blob-1 {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(212,120,10,0.22) 0%, transparent 65%);
    top: -200px;
    left: -100px;
    pointer-events: none;
  }

  .blob-2 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(192,65,15,0.14) 0%, transparent 65%);
    bottom: -150px;
    right: -50px;
    pointer-events: none;
  }

  /* Faint cross/grid texture */
  .texture {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f5f0e8' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* Ghost glyph */
  .ghost {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 480px;
    line-height: 1;
    color: rgba(245,240,232,0.035);
    right: -40px;
    top: -60px;
    letter-spacing: -0.02em;
    pointer-events: none;
    user-select: none;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 100%;
    padding: 64px 80px;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #f0a830;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 36px;
    height: 2px;
    background: #f0a830;
    flex-shrink: 0;
  }

  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 172px;
    line-height: 0.88;
    letter-spacing: 0.01em;
    color: #f5f0e8;
    margin-bottom: 28px;
  }

  .wordmark span {
    color: #f0a830;
  }

  .tagline {
    font-family: 'Crimson Pro', serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: rgba(245,240,232,0.68);
    max-width: 600px;
    line-height: 1.4;
  }

  /* Bottom rule + attribution */
  .bottom-bar {
    position: absolute;
    z-index: 2;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(to right, #d4780a, #f0a830, #d4780a);
  }

  .source {
    position: absolute;
    z-index: 2;
    bottom: 24px;
    right: 80px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
  }
</style>
</head>
<body>

  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="texture"></div>
  <div class="ghost">GISH</div>

  <div class="content">
    <div class="eyebrow">A thought experiment</div>
    <div class="wordmark">re<span>GISH</span></div>
    <div class="tagline">What if the Greatest International Scavenger Hunt never had to end?</div>
  </div>

  <div class="bottom-bar"></div>
  <div class="source">upspire.studio</div>

</body>
</html>
